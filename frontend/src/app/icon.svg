<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#c2410c"/>

  <!-- Pulse / EKG waveform in white -->
  <polyline
    points="2,17 7,17 10,9 13,25 16,13 19,17 22,17"
    stroke="white"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Maple leaf at the peak of the pulse (simplified, 5-point) -->
  <g transform="translate(26, 10) scale(0.38)">
    <path
      d="M0,-9 L1.8,-3.5 L7.5,-4.5 L4.5,0 L7,1.5 L3.5,1.5 L4.5,7 L0,5 L-4.5,7 L-3.5,1.5 L-7,1.5 L-4.5,0 L-7.5,-4.5 L-1.8,-3.5 Z"
      fill="white"
      opacity="0.9"
    />
  </g>

  <!-- Trailing line after maple leaf -->
  <line x1="29" y1="17" x2="30" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
